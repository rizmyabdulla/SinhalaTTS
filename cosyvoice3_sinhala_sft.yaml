# =============================================================================
# CosyVoice3 SFT Config for Sinhala (T4-optimized, bf16)
# =============================================================================
#
# Derived from the upstream `examples/libritts/cosyvoice3/conf/cosyvoice3.yaml`
# with these SFT-specific overrides:
#
#   * lr       1e-5 (instead of 1e-3). SFT uses a tiny LR to avoid catastrophic
#              forgetting of the 9-language CosyVoice3 pretraining. With lr=1e-3
#              the model will start generating garbled Sinhala after a few
#              hundred steps.
#   * scheduler constantlr (instead of warmuplr). The SFT corpus is tiny
#              (~1k-2k utts) so warmup is unnecessary and constantlr is what
#              every published CosyVoice3 SFT recipe uses.
#   * max_frames_in_batch 1500 (down from 2000). T4 has 16 GB; 2000 frames
#              pushes us into OOM territory when training LLM+Flow together.
#   * max_length 6000 -> 4500. Sinhala transcriptions are short; 4500 frames
#              (60s @ 25Hz token) covers everything we have.
#   * max_epoch 30 (instead of 200). With our small corpus and lr=1e-5 this is
#              enough. 200 epochs over ~1.5k utts will just overfit.
#   * use_spk_embedding True during padding (SFT condition on speaker).
#   * data_pipeline adds compute_whisper_fbank (CosyVoice3 only).
#
# If you have >10 hours of Sinhala data, raise max_epoch to 100 and lr to 2e-5.

# Reproducibility
__set_seed1: !apply:random.seed [1986]
__set_seed2: !apply:numpy.random.seed [1986]
__set_seed3: !apply:torch.manual_seed [1986]
__set_seed4: !apply:torch.cuda.manual_seed_all [1986]

# Fixed params (must match the upstream model definition)
sample_rate: 24000
llm_input_size: 896
llm_output_size: 896
spk_embed_dim: 192
qwen_pretrain_path: ''  # overridden at launch time
token_frame_rate: 25
token_mel_ratio: 2

# Streaming params (we use offline inference; these are inert for training)
chunk_size: 25
num_decoding_left_chunks: -1

# -----------------------------------------------------------------------------
# LLM: Qwen2-based speech-token decoder
# -----------------------------------------------------------------------------
llm: !new:cosyvoice.llm.llm.CosyVoice3LM
    llm_input_size: !ref <llm_input_size>
    llm_output_size: !ref <llm_output_size>
    speech_token_size: 6561
    length_normalized_loss: True
    lsm_weight: 0.1          # label smoothing: small but non-zero for natural prosody
    mix_ratio: [5, 15]       # speech/text token mixing during training
    llm: !new:cosyvoice.llm.llm.Qwen2Encoder
        pretrain_path: !ref <qwen_pretrain_path>
    sampling: !name:cosyvoice.utils.common.ras_sampling
        top_p: 0.8
        top_k: 25
        win_size: 10
        tau_r: 0.1

# -----------------------------------------------------------------------------
# Flow: DiT-based mel decoder
# -----------------------------------------------------------------------------
flow: !new:cosyvoice.flow.flow.CausalMaskedDiffWithDiT
    input_size: 80
    output_size: 80
    spk_embed_dim: !ref <spk_embed_dim>
    output_type: 'mel'
    vocab_size: 6561
    input_frame_rate: !ref <token_frame_rate>
    only_mask_loss: True
    token_mel_ratio: !ref <token_mel_ratio>
    pre_lookahead_len: 3
    pre_lookahead_layer: !new:cosyvoice.transformer.upsample_encoder.PreLookaheadLayer
        in_channels: 80
        channels: 1024
        pre_lookahead_len: 3
    decoder: !new:cosyvoice.flow.flow_matching.CausalConditionalCFM
        in_channels: 240
        n_spks: 1
        spk_emb_dim: 80
        cfm_params: !new:omegaconf.DictConfig
            content:
                sigma_min: 1e-06
                solver: 'euler'
                t_scheduler: 'cosine'
                training_cfg_rate: 0.2
                inference_cfg_rate: 0.7
                reg_loss_type: 'l1'
        estimator: !new:cosyvoice.flow.DiT.dit.DiT
            dim: 1024
            depth: 22
            heads: 16
            dim_head: 64
            ff_mult: 2
            mel_dim: 80
            mu_dim: 80
            spk_dim: 80
            out_channels: 80
            static_chunk_size: !ref <chunk_size> * <token_mel_ratio>
            num_decoding_left_chunks: !ref <num_decoding_left_chunks>

# -----------------------------------------------------------------------------
# HiFi-GAN: HiFT vocoder
# -----------------------------------------------------------------------------
hift: !new:cosyvoice.hifigan.generator.CausalHiFTGenerator
    in_channels: 80
    base_channels: 512
    nb_harmonics: 8
    sampling_rate: !ref <sample_rate>
    nsf_alpha: 0.1
    nsf_sigma: 0.003
    nsf_voiced_threshold: 10
    upsample_rates: [8, 5, 3]
    upsample_kernel_sizes: [16, 11, 7]
    istft_params:
        n_fft: 16
        hop_len: 4
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    source_resblock_kernel_sizes: [7, 7, 11]
    source_resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    lrelu_slope: 0.1
    audio_limit: 0.99
    conv_pre_look_right: 4
    f0_predictor: !new:cosyvoice.hifigan.f0_predictor.CausalConvRNNF0Predictor
        num_class: 1
        in_channels: 80
        cond_channels: 512

# GAN module
mel_spec_transform1: !name:matcha.utils.audio.mel_spectrogram
    n_fft: 1920
    num_mels: 80
    sampling_rate: !ref <sample_rate>
    hop_size: 480
    win_size: 1920
    fmin: 0
    fmax: null
    center: False
hifigan: !new:cosyvoice.hifigan.hifigan.HiFiGan
    generator: !ref <hift>
    discriminator: !new:cosyvoice.hifigan.discriminator.MultipleDiscriminator
        mpd: !new:matcha.hifigan.models.MultiPeriodDiscriminator
        mrd: !new:cosyvoice.hifigan.discriminator.MultiResSpecDiscriminator
    mel_spec_transform: [
        !ref <mel_spec_transform1>
    ]

# -----------------------------------------------------------------------------
# Data processing pipeline
# -----------------------------------------------------------------------------
parquet_opener: !name:cosyvoice.dataset.processor.parquet_opener
get_tokenizer: !name:cosyvoice.tokenizer.tokenizer.get_qwen_tokenizer
    token_path: !ref <qwen_pretrain_path>
    skip_special_tokens: True
    version: cosyvoice3
allowed_special: 'all'
tokenize: !name:cosyvoice.dataset.processor.tokenize
    get_tokenizer: !ref <get_tokenizer>
    allowed_special: !ref <allowed_special>
filter: !name:cosyvoice.dataset.processor.filter
    max_length: 4500         # shorter cap for Sinhala (most utts < 12 s)
    min_length: 100
    token_max_length: 200
    token_min_length: 1
resample: !name:cosyvoice.dataset.processor.resample
    resample_rate: !ref <sample_rate>
truncate: !name:cosyvoice.dataset.processor.truncate
    truncate_length: 24960
feat_extractor: !name:matcha.utils.audio.mel_spectrogram
    n_fft: 1920
    num_mels: 80
    sampling_rate: !ref <sample_rate>
    hop_size: 480
    win_size: 1920
    fmin: 0
    fmax: null
    center: False
compute_fbank: !name:cosyvoice.dataset.processor.compute_fbank
    feat_extractor: !ref <feat_extractor>
    num_frames: 960
compute_whisper_fbank: !name:cosyvoice.dataset.processor.compute_whisper_fbank
    num_frames: 960
compute_f0: !name:cosyvoice.dataset.processor.compute_f0
    sample_rate: !ref <sample_rate>
    hop_size: 480
parse_embedding: !name:cosyvoice.dataset.processor.parse_embedding
    normalize: True
shuffle: !name:cosyvoice.dataset.processor.shuffle
    shuffle_size: 1000
sort: !name:cosyvoice.dataset.processor.sort
    sort_size: 500
batch: !name:cosyvoice.dataset.processor.batch
    batch_type: 'dynamic'
    max_frames_in_batch: 1500   # T4-friendly
padding: !name:cosyvoice.dataset.processor.padding
    use_spk_embedding: True     # SFT: condition on speaker

# Order: tokenize -> filter -> (pre-extracted fbank, in pipeline) -> ...
# CosyVoice3's online pipeline will also call compute_whisper_fbank.
data_pipeline: [
    !ref <parquet_opener>,
    !ref <tokenize>,
    !ref <filter>,
    !ref <resample>,
    !ref <compute_fbank>,
    !ref <parse_embedding>,
    !ref <compute_whisper_fbank>,
    !ref <shuffle>,
    !ref <sort>,
    !ref <batch>,
    !ref <padding>,
]
data_pipeline_gan: [
    !ref <parquet_opener>,
    !ref <tokenize>,
    !ref <filter>,
    !ref <resample>,
    !ref <truncate>,
    !ref <compute_fbank>,
    !ref <compute_f0>,
    !ref <parse_embedding>,
    !ref <shuffle>,
    !ref <sort>,
    !ref <batch>,
    !ref <padding>,
]

# -----------------------------------------------------------------------------
# Training schedule
# -----------------------------------------------------------------------------
train_conf:
    optim: adam
    optim_conf:
        lr: 1.0e-5            # SFT-safe LR (1e-3 is for from-scratch only)
    scheduler: constantlr
    scheduler_conf:
        warmup_steps: 0
    max_epoch: 30
    grad_clip: 5
    accum_grad: 4            # effective batch ~4x larger; ds_stage2.json keeps gradient_accumulation_steps=1
    log_interval: 50
    save_per_step: 500       # checkpoint every 500 steps

train_conf_gan:
    optim: adam
    optim_conf:
        lr: 2.0e-4
    scheduler: constantlr
    optim_d: adam
    optim_conf_d:
        lr: 2.0e-4
    scheduler_d: constantlr
    max_epoch: 30
    grad_clip: 5
    accum_grad: 1            # GAN: must be 1
    log_interval: 50
    save_per_step: 500